name: 'Agents Schema dbt'
description: >
  Creates a dbt manifest if needed, then ingests dbt metadata into AGENTS.DBT_*
  tables in Snowflake.

inputs:
  dbt-project-dir:
    description: 'Path to the dbt project containing target/manifest.json'
    required: false
    default: 'dbt_project'
  dbt-adapter:
    description: 'dbt adapter package to install when creating a manifest'
    required: false
    default: 'dbt-snowflake'
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Create dbt manifest if missing
      shell: bash
      run: |
        project_dir="${{ inputs.dbt-project-dir }}"
        manifest_path="$project_dir/target/manifest.json"
        profiles_dir="$project_dir"

        if [ -f "$manifest_path" ]; then
          echo "Using existing dbt manifest at $manifest_path"
          exit 0
        fi

        if [ -n "${DBT_PROFILES_YML:-}" ]; then
          profiles_dir="$RUNNER_TEMP/agents-schema-dbt-profiles"
          mkdir -p "$profiles_dir"
          printf '%s\n' "$DBT_PROFILES_YML" > "$profiles_dir/profiles.yml"
        elif [ -f "$project_dir/profiles.yml" ]; then
          profiles_dir="$project_dir"
        else
          echo "dbt manifest not found at $manifest_path" >&2
          echo "No DBT_PROFILES_YML secret was provided and no profiles.yml exists at $project_dir/profiles.yml" >&2
          exit 1
        fi

        if [ -f "$project_dir/packages.yml" ] || [ -f "$project_dir/dependencies.yml" ]; then
          uvx --with "${{ inputs.dbt-adapter }}" dbt deps \
            --project-dir "$project_dir" \
            --profiles-dir "$profiles_dir"
        fi

        uvx --with "${{ inputs.dbt-adapter }}" dbt parse \
          --project-dir "$project_dir" \
          --profiles-dir "$profiles_dir" \
          --no-partial-parse

    - name: Run dbt ingestion
      shell: bash
      run: |
        uvx --from "agents-schema @ git+https://github.com/fivetran/agents_schema.git@v0.0.1" \
          agents-schema dbt --project-dir "${{ inputs.dbt-project-dir }}"
