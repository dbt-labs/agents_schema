name: 'Agents Schema OSI'
description: >
  Ingests Open Semantic Interchange metadata into AGENTS.OSI_* tables.

inputs:
  osi-dir:
    description: 'Path to a directory containing *.osi.yaml files'
    required: true
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Run OSI ingestion
      shell: bash
      env:
        AGENTS_SCHEMA_OSI_DIR: ${{ inputs.osi-dir }}
      run: |
        uvx --from "agents-schema==0.0.10" \
          agents-schema osi --osi-dir "$AGENTS_SCHEMA_OSI_DIR"
