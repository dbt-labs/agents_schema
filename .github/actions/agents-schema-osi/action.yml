name: 'Agents Schema OSI'
description: >
  Ingests Open Semantic Interchange metadata into AGENTS.OSI_* tables.

inputs:
  osi-dir:
    description: 'Path to a directory containing *.osi.yaml files'
    required: true
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Run OSI ingestion
      shell: bash
      run: |
        uvx --from "agents-schema @ git+https://github.com/fivetran/agents_schema.git@v0.0.5" \
          agents-schema osi --osi-dir "${{ inputs.osi-dir }}"
