name: 'Agents Schema Atlan'
description: >
  Ingests Atlan metadata into AGENTS.ATLAN_* tables.

inputs:
  metadata-path:
    description: 'Path to a Atlan asset export file or directory'
    required: true
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Run Atlan ingestion
      shell: bash
      run: |
        uvx --from "agents-schema==0.0.6" \
          agents-schema atlan --metadata-path "${{ inputs.metadata-path }}"
