name: 'Agents Schema dbt Semantic Layer'
description: >
  Ingests dbt Semantic Layer metadata into AGENTS.DBT_SEMANTIC_* tables.

inputs:
  semantic-manifest:
    description: 'Path to a semantic_manifest.json or a directory of semantic metadata exports'
    required: true
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Run dbt Semantic Layer ingestion
      shell: bash
      run: |
        uvx --from "agents-schema==0.0.6" \
          agents-schema dbt-semantic --semantic-manifest "${{ inputs.semantic-manifest }}"
