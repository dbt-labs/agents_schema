name: 'Agents Schema Tableau'
description: >
  Ingests Tableau metadata into AGENTS.TABLEAU_* tables.

inputs:
  metadata-path:
    description: 'Path to a Tableau Metadata API export file or directory'
    required: true
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Run Tableau ingestion
      shell: bash
      run: |
        uvx --from "agents-schema==0.0.6" \
          agents-schema tableau --metadata-path "${{ inputs.metadata-path }}"
