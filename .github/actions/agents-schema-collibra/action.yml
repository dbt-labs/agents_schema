name: 'Agents Schema Collibra'
description: >
  Ingests Collibra metadata into AGENTS.COLLIBRA_* tables.

inputs:
  metadata-path:
    description: 'Path to a Collibra API export file or directory'
    required: true
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Run Collibra ingestion
      shell: bash
      run: |
        uvx --from "agents-schema==0.0.6" \
          agents-schema collibra --metadata-path "${{ inputs.metadata-path }}"
