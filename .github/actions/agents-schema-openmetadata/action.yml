name: 'Agents Schema OpenMetadata'
description: >
  Ingests OpenMetadata metadata into AGENTS.OPENMETADATA_* tables.

inputs:
  metadata-path:
    description: 'Path to a OpenMetadata API export file or directory'
    required: true
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Run OpenMetadata ingestion
      shell: bash
      run: |
        uvx --from "agents-schema==0.0.6" \
          agents-schema openmetadata --metadata-path "${{ inputs.metadata-path }}"
