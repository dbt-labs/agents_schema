name: 'Agents Schema Alation'
description: >
  Ingests Alation metadata into AGENTS.ALATION_* tables.

inputs:
  metadata-path:
    description: 'Path to a Alation API export file or directory'
    required: true
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Run Alation ingestion
      shell: bash
      run: |
        uvx --from "agents-schema==0.0.6" \
          agents-schema alation --metadata-path "${{ inputs.metadata-path }}"
