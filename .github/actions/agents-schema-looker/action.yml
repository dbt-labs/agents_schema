name: 'Agents Schema Looker'
description: >
  Ingests LookML metadata into AGENTS.LOOKML_* tables.

inputs:
  lookml-dir:
    description: 'Path to a Looker project or directory containing *.lkml files'
    required: true
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Run Looker ingestion
      shell: bash
      env:
        AGENTS_SCHEMA_LOOKML_DIR: ${{ inputs.lookml-dir }}
      run: |
        uvx --from "agents-schema==0.0.6" \
          agents-schema looker --lookml-dir "$AGENTS_SCHEMA_LOOKML_DIR"
