name: 'Agents Schema Power BI'
description: >
  Ingests Power BI metadata into AGENTS.POWERBI_* tables.

inputs:
  metadata-path:
    description: 'Path to a Fabric / Power BI scanner metadata export file or directory'
    required: true
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Run Power BI ingestion
      shell: bash
      run: |
        uvx --from "agents-schema==0.0.6" \
          agents-schema powerbi --metadata-path "${{ inputs.metadata-path }}"
