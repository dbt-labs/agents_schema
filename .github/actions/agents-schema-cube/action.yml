name: 'Agents Schema Cube'
description: >
  Ingests Cube metadata into AGENTS.CUBE_* tables.

inputs:
  metadata-path:
    description: 'Path to a Cube /v1/meta export file or directory'
    required: true
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Run Cube ingestion
      shell: bash
      run: |
        uvx --from "agents-schema==0.0.6" \
          agents-schema cube --metadata-path "${{ inputs.metadata-path }}"
