name: Agents Schema dbt

on:
  workflow_call:
    inputs:
      dbt-project-dir:
        description: 'Path to the dbt project containing target/manifest.json'
        type: string
        required: true
      dbt-profile-name:
        description: 'dbt profile name to use for managed dbt parse when target/manifest.json is missing'
        type: string
        required: false
        default: ''
      dbt-target:
        description: 'Optional dbt target to use for managed dbt parse'
        type: string
        required: false
        default: ''
      dbt-parse-command:
        description: 'Optional custom command to create target/manifest.json when it is missing'
        type: string
        required: false
        default: ''
    secrets:
      WAREHOUSE_CREDENTIALS:
        required: true
      DBT_PROFILES_YML:
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run dbt ingestion
        uses: fivetran/agents_schema/.github/actions/agents-schema-dbt@v0.0.5
        with:
          dbt-project-dir: ${{ inputs.dbt-project-dir }}
          dbt-profile-name: ${{ inputs.dbt-profile-name }}
          dbt-target: ${{ inputs.dbt-target }}
          dbt-parse-command: ${{ inputs.dbt-parse-command }}
        env:
          WAREHOUSE_CREDENTIALS: ${{ secrets.WAREHOUSE_CREDENTIALS }}
          DBT_PROFILES_YML: ${{ secrets.DBT_PROFILES_YML }}
