name: Agents Schema OSI

on:
  workflow_call:
    inputs:
      osi-dir:
        description: 'Path to a directory containing *.osi.yaml files'
        type: string
        required: true
    secrets:
      WAREHOUSE_CREDENTIALS:
        required: true

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run OSI ingestion
        uses: fivetran/agents_schema/.github/actions/agents-schema-osi@v0.0.9
        with:
          osi-dir: ${{ inputs.osi-dir }}
        env:
          WAREHOUSE_CREDENTIALS: ${{ secrets.WAREHOUSE_CREDENTIALS }}
