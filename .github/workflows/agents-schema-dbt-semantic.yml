name: Agents Schema dbt Semantic Layer

on:
  workflow_call:
    inputs:
      semantic-manifest:
        description: 'Path to a semantic_manifest.json or a directory of semantic metadata exports'
        type: string
        required: true
    secrets:
      WAREHOUSE_CREDENTIALS:
        required: true

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run dbt Semantic Layer ingestion
        uses: fivetran/agents_schema/.github/actions/agents-schema-dbt-semantic@v0.0.6
        with:
          semantic-manifest: ${{ inputs.semantic-manifest }}
        env:
          WAREHOUSE_CREDENTIALS: ${{ secrets.WAREHOUSE_CREDENTIALS }}
