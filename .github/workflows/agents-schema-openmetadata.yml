name: Agents Schema OpenMetadata

on:
  workflow_call:
    inputs:
      metadata-path:
        description: 'Path to a OpenMetadata API export file or directory'
        type: string
        required: true
    secrets:
      WAREHOUSE_CREDENTIALS:
        required: true

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run OpenMetadata ingestion
        uses: fivetran/agents_schema/.github/actions/agents-schema-openmetadata@v0.0.6
        with:
          metadata-path: ${{ inputs.metadata-path }}
        env:
          WAREHOUSE_CREDENTIALS: ${{ secrets.WAREHOUSE_CREDENTIALS }}
