name: Agents Schema dbt + Looker + OSI

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  agents-schema-dbt:
    uses: fivetran/agents_schema/.github/workflows/agents-schema-dbt.yml@v0.0.5
    with:
      dbt-project-dir: dbt_project  # change to your dbt project directory (contains dbt_project.yml)
    secrets: inherit

  agents-schema-looker:
    uses: fivetran/agents_schema/.github/workflows/agents-schema-looker.yml@v0.0.5
    with:
      lookml-dir: lookml  # change to the directory with your *.lkml files
    secrets: inherit

  agents-schema-osi:
    uses: fivetran/agents_schema/.github/workflows/agents-schema-osi.yml@v0.0.5
    with:
      osi-dir: osi  # change to the directory with your *.osi.yaml files
    secrets: inherit
